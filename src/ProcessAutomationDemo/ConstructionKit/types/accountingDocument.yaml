$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
types:
  - typeId: AccountingDocument
    derivedFromCkTypeId: ${System}/Entity
    description: "An accounting related document entity that contains accounting information."
    attributes:
      - id: ${Basic}/Comment
        name: Comment
        isOptional: true
      - id: ${this}/GrossTotal
        name: GrossTotal
        isOptional: true
      - id: ${this}/NetTotal
        name: NetTotal
        isOptional: true
      - id: ${this}/TaxTotal
        name: TaxTotal
        isOptional: true
      - id: ${this}/Issuer
        name: Issuer
        isOptional: true
      - id: ${Basic}/BankAccount
        name: BankAccount
        isOptional: true
      - id: ${Basic}/DocumentNumber
        name: DocumentNumber
        autoIncrementReference: "AccountingDocumentNumber"
      - id: ${Basic}/DocumentDate
        name: DocumentDate
        isOptional: true
      - id: ${this}/TransactionNumber
        name: TransactionNumber
        isOptional: true
      - id: ${this}/DocumentState
        name: DocumentState
        isOptional: true

