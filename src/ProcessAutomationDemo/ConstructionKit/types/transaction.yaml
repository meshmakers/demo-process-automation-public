$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
types:
  - typeId: Transaction
    derivedFromCkTypeId: ${System}/Entity
    attributes:
      - id: ${this}/TransactionDate
        name: TransactionDate
      - id: ${this}/CounterpartyAccount
        name: CounterpartyAccount
      - id: ${this}/OwnerAccount
        name: OwnerAccount
      - id: ${this}/Amount
        name: Amount
      - id: ${this}/TransactionText
        name: TransactionText
      - id: ${this}/TransactionReference
        name: TransactionReference
      - id: ${this}/ValueDate
        name: ValueDate
      - id: ${this}/VirtualCard
        name: VirtualCard
        isOptional: true
      - id: ${this}/PayedWith
        name: PayedWith
        isOptional: true
      - id: ${this}/PaymentReference
        name: PaymentReference
        isOptional: true
      - id: ${this}/MandateId
        name: MandateId
        isOptional: true
      - id: ${this}/CreditorId
        name: CreditorId
        isOptional: true
