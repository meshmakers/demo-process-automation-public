$schema: https://schemas.meshmakers.cloud/runtime-model.schema.json
dependencies:
  - System.Communication-[3.0,4.0)
entities:
  - rtId: 68e24502cd702ddd247d4eb8
    rtCreationDateTime: 2025-10-05T10:14:26.1470000Z
    rtChangedDateTime: 2025-10-06T06:54:36.2700000Z
    ckTypeId: System.Communication/DataFlow
    associations: []
    attributes:
      - id: System/Name
        value: detect_anomalies_amount_percent_change
      - id: System/Description
        value: Detects anomalies of Accounting Document grossTotals using Percentage Change StatisticalAnomalyDetection node
  - rtId: 68e24502cd702ddd247d4eb9
    rtCreationDateTime: 2025-10-05T10:14:26.2200000Z
    rtChangedDateTime: 2025-10-06T06:42:48.6000000Z
    ckTypeId: System.Communication/Pipeline
    associations:
      - roleId: System/ParentChild
        targetRtId: 68e24502cd702ddd247d4eb8
        targetCkTypeId: System.Communication/DataFlow
      - roleId: System.Communication/Executes
        targetRtId: 66004fda527ac79a03ecedd7
        targetCkTypeId: System.Communication/Adapter
    attributes:
      - id: System/Name
        value: detect_anomalies_amount_percent_change_pipeline
      - id: System/Description
        value: >
          Runs a PercentChange statistical detector over every AccountingDocument's
          GrossTotal, grouped by issuer. Invoices whose value deviates more than
          50% from the running baseline are flagged DocumentState=REVIEW with a
          human-readable reason in Comment.
      - id: System/Enabled
        value: true
      - id: System.Communication/PipelineDefinition
        value: |-
          triggers:
            - type: FromExecutePipelineCommand@1
              description: Manual trigger — invoked via `octo-cli -c ExecutePipeline -id <this pipeline's RtId>` or from Refinery Studio
          transformations:
            - type: GetRtEntitiesByType@1
              description: Load up to 100 AccountingDocument entities (all invoices in the tenant) into $.documents
              ckTypeId: AccountingDemo/AccountingDocument
              skip: 0
              take: 100
              targetPath: $.documents
            - type: StatisticalAnomalyDetection@1
              description: Percent-change anomaly detection on GrossTotal, grouped per issuer; writes matches into $.anomalies
              path: $.documents.Items[*]
              targetPath: $.anomalies
              resetStatistics: true
              detectors:
                - path: $.Attributes.GrossTotal
                  groupByPath: $.Attributes.Issuer.Attributes.CompanyName
                  contextPath: $
                  method: PercentChange
                  threshold: 50.0
                  minSamples: 2
            - type: ForEach@1
              description: For each detected anomaly, build an UPDATE action that flags the invoice as REVIEW and copies the detector's reason into Comment
              iterationPath: $.anomalies
              mergePath: $.updates
              targetPath: $.updates
              transformations:
                - type: CreateUpdateInfo@1
                  description: Queue an UPDATE for the flagged AccountingDocument — set DocumentState=REVIEW, copy $.key.reason into Comment
                  targetPath: $.updates._items
                  targetValueKind: Array
                  updateKind: UPDATE
                  ckTypeId: AccountingDemo/AccountingDocument
                  rtIdPath: $.key.context.RtId
                  attributeUpdates:
                    - attributeName: DocumentState
                      attributeValueType: Enum
                      value: REVIEW
                    - attributeName: Comment
                      attributeValueType: String
                      valuePath: $.key.reason
            - type: Flatten@1
              description: Flatten per-anomaly update arrays into one flat $._result._items list that ApplyChanges can consume in one shot
              path: $.updates[*]._items[*]
              targetPath: $._result._items
              targetValueKind: Simple
              targetValueWriteMode: Overwrite
            - type: Project@1
              description: Drop the $.updates scratch area from the context (internal-only)
              fields:
                - path: "$.updates"
            - type: ApplyChanges@2
              description: Commit all queued UPDATEs in a single transaction; triggered explicitly because this pipeline only mutates (no trigger-attached ApplyChanges)
              entityUpdatesPath: $._result._items
