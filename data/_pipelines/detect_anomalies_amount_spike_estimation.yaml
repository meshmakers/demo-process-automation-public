$schema: https://schemas.meshmakers.cloud/runtime-model.schema.json
dependencies:
  - System.Communication-[3.0,4.0)
entities:
  - rtId: 68e26edecd702ddd247d4ebc
    rtCreationDateTime: 2025-10-05T13:13:02.0270000Z
    rtChangedDateTime: 2025-10-06T06:55:03.9750000Z
    ckTypeId: System.Communication/DataFlow
    associations: []
    attributes:
      - id: System/Name
        value: detect_anomalies_amount_spike_estimation
      - id: System/Description
        value: Detects anomalies of Accounting Document grossTotals using Spike detection of MachineLearningAnomalyDetection node
  - rtId: 68e26ef7cd702ddd247d4ebd
    rtCreationDateTime: 2025-10-05T13:13:27.7590000Z
    rtChangedDateTime: 2025-10-06T06:42:48.6180000Z
    ckTypeId: System.Communication/Pipeline
    associations:
      - roleId: System/ParentChild
        targetRtId: 68e26edecd702ddd247d4ebc
        targetCkTypeId: System.Communication/DataFlow
      - roleId: System.Communication/Executes
        targetRtId: 67e10c0bfe3e19891bbfd261
        targetCkTypeId: System.Communication/Adapter
    attributes:
      - id: System/Name
        value: detect_anomalies_amount_spike_estimation_pipeline
      - id: System/Description
        value: >
          Runs an ML.NET IID spike detector over every AccountingDocument's
          GrossTotal, grouped by issuer. Distributional outliers are flagged
          DocumentState=REVIEW with the detector's level/score/pValue in
          Comment.
      - id: System/Enabled
        value: true
      - id: System.Communication/PipelineDefinition
        value: |-
          triggers:
            - type: FromExecutePipelineCommand@1
              description: Manual trigger — invoked via `octo-cli -c ExecutePipeline -id <this pipeline's RtId>` or from Refinery Studio
          transformations:
            - type: GetRtEntitiesByType@1
              description: Load up to 100 AccountingDocument entities (all invoices in the tenant) into $.documents
              ckTypeId: AccountingDemo/AccountingDocument
              skip: 0
              take: 100
              targetPath: $.documents
            - type: MachineLearningAnomalyDetection@1
              description: ML.NET IID spike detection on GrossTotal, grouped per issuer; writes matches into $.anomalies
              path: $.documents.Items[*]
              targetPath: $.anomalies
              resetStatistics: true
              detectors:
                - path: $.Attributes.GrossTotal
                  groupByPath: $.Attributes.Issuer.Attributes.CompanyName
                  contextPath: $
                  detectSpikes: true
                  detectChangePoints: false
                  minDataPoints: 3
                  pValueHistoryLength: 3
            - type: ForEach@1
              description: For each detected anomaly, format the reason and build an UPDATE action that flags the invoice as REVIEW
              iterationPath: $.anomalies
              mergePath: $.updates
              targetPath: $.updates
              transformations:
                - type: FormatString@1
                  description: Build a human-readable reason like "Invoice amounts are out of range with level 1, score 2880, pValue 1E-08" from the detector's metrics
                  targetPath: $.key.reason
                  format: "Invoice amounts are out of range with level {$.key.level}, score {$.key.score}, pValue {$.key.pValue}"
                - type: CreateUpdateInfo@1
                  description: Queue an UPDATE for the flagged AccountingDocument — set DocumentState=REVIEW, copy the formatted reason into Comment
                  targetPath: $.updates._items
                  targetValueKind: Array
                  updateKind: UPDATE
                  ckTypeId: AccountingDemo/AccountingDocument
                  rtIdPath: $.key.context.RtId
                  attributeUpdates:
                    - attributeName: DocumentState
                      attributeValueType: Enum
                      value: REVIEW
                    - attributeName: Comment
                      attributeValueType: String
                      valuePath: $.key.reason
            - type: Flatten@1
              description: Flatten per-anomaly update arrays into one flat $._result._items list that ApplyChanges can consume in one shot
              path: $.updates[*]._items[*]
              targetPath: $._result._items
              targetValueKind: Simple
              targetValueWriteMode: Overwrite
            - type: Project@1
              description: Drop the $.updates scratch area from the context (internal-only)
              fields:
                - path: "$.updates"
            - type: ApplyChanges@2
              description: Commit all queued UPDATEs in a single transaction
              entityUpdatesPath: $._result._items
