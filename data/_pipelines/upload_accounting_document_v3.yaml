$schema: https://schemas.meshmakers.cloud/runtime-model.schema.json
dependencies:
  - System.Communication-[3.0,4.0)
entities:
  - rtId: 68e24109cd702ddd247d4eb4
    rtCreationDateTime: 2025-10-05T09:57:29.4370000Z
    rtChangedDateTime: 2025-10-05T09:58:26.3650000Z
    ckTypeId: System.Communication/DataFlow
    associations: []
    attributes:
      - id: System/Name
        value: upload_accounting_document_v3
      - id: System/Description
        value: >
          Allows to upload a PDF document using HTTP including OCR and AI extraction of accounting data - including the extraction process of multiple attributes.
  - rtId: 68e24109cd702ddd247d4eb5
    rtCreationDateTime: 2025-10-05T09:57:29.4700000Z
    rtChangedDateTime: 2025-10-05T09:59:10.4810000Z
    ckTypeId: System.Communication/Pipeline
    associations:
      - roleId: System/ParentChild
        targetRtId: 68e24109cd702ddd247d4eb4
        targetCkTypeId: System.Communication/DataFlow
      - roleId: System.Communication/Executes
        targetRtId: 66004fda527ac79a03ecedd7
        targetCkTypeId: System.Communication/Adapter
    attributes:
      - id: System/Name
        value: upload_accounting_document_v3_pipeline
      - id: System/Description
        value: >
          Full-extraction variant of v2: OCRs the PDF, asks the AI for a rich
          JSON (bank account, issuer, address, transaction, amounts), and
          inserts an AccountingDocument with every field populated.
      - id: System/Enabled
        value: true
      - id: System.Communication/PipelineDefinition
        value: |-
          triggers:
            - type: FromHttpRequest@1
              description: POST /uploadAccountingDocumentv3 — entry point for the full-extraction v3 upload endpoint
              path: /uploadAccountingDocumentv3
              method: POST
          transformations:
            - type: Logger@1
              description: Debug log (kept to show pipeline is running; remove if noisy)
              message: upload_accounting_document_v3 invoked
            - type: If@1
              description: Only process requests whose content type is application/pdf; drop everything else
              path: $.contentType
              operator: Equals
              value: "application/pdf"
              valueType: String
              transformations:
                - type: CreateFileSystemUpdate@1
                  description: Store the uploaded PDF under the well-known "Accounting" root folder, auto-generate RtId and file name
                  targetPath: $.fileSystemItem
                  path: $.body
                  generateRtId: true
                  generateFileName: true
                  contentTypePath: $.contentType
                  contentLengthPath: $.contentLength
                  rootFolderWellKnownName: "Accounting"
                - type: PdfOcrExtraction@1
                  description: OCR the PDF content, also emit a confidence score alongside the text
                  path: $.body
                  targetPath: $.ocr.result
                  includeConfidence: true
                  confidenceOutputPath: $.ocr.confidence
                - type: AnthropicAiQuery@1
                  description: Ask the AI to extract a full invoice JSON (amounts, bank account, issuer, address, transaction); the schema is conveyed via jsonFormatSample
                  question: Extract all relevant accounting information, as shown in the example. The data may be encoded in UTF-8.
                  path: $.ocr.result
                  temperature: 0.1
                  responseFormat: json
                  targetPath: $.ai.result
                  jsonFormatSample: '{ "amount": { "grossTotal": 1200.00, "netTotal": 1000.00, "taxTotal": 200.00 }, "bankAccount": { "accountHolder": "BigComp GmbH", "iban": "AT741233964761549439" }, "issuer": { "companyName": "BigComp GmbH", "address": { "cityTown": "Salzburg", "nationalCode": "AT", "street": "Hauptstraße", "zipcode": 5020 } }, "transaction": { "date": "2025-09-30", "number": "inv-20250930-abc" } }'
                - type: Project@1
                  description: Strip large/raw HTTP fields from the data context so the eventual response stays small
                  fields:
                    - path: "$.body"
                    - path: "$.bodyEncoding"
                    - path: "$.path"
                    - path: "$.contentType"
                    - path: "$.contentLength"
                    - path: "$.method"
                - type: CreateUpdateInfo@1
                  description: Queue an INSERT for a new AccountingDocument, mapping every relevant AI-extracted JSON field onto the CK attribute it belongs to
                  targetPath: $.updates._items
                  targetValueKind: Array
                  targetValueWriteMode: Append
                  updateKind: INSERT
                  ckTypeId: AccountingDemo/AccountingDocument
                  rtIdPath: $.rtId
                  generateRtId: true
                  attributeUpdates:
                    - attributeName: BankAccount.AccountHolder
                      attributeValueType: String
                      valuePath: $.ai.result.bankAccount.accountHolder
                    - attributeName: BankAccount.Iban
                      attributeValueType: String
                      valuePath: $.ai.result.bankAccount.iban
                    - attributeName: DocumentDate
                      attributeValueType: DateTime
                      valuePath: $.ai.result.transaction.date
                    - attributeName: TransactionNumber
                      attributeValueType: String
                      valuePath: $.ai.result.transaction.number
                    - attributeName: DocumentState
                      attributeValueType: Enum
                      value: "NEW"
                    - attributeName: Issuer.LegalEntityType
                      attributeValueType: Enum
                      value: "COMPANY"
                    - attributeName: Issuer.CompanyName
                      attributeValueType: String
                      valuePath: $.ai.result.issuer.companyName
                    - attributeName: Issuer.Address.Street
                      attributeValueType: String
                      valuePath: $.ai.result.issuer.address.street
                    - attributeName: Issuer.Address.Zipcode
                      attributeValueType: Int
                      valuePath: $.ai.result.issuer.address.zipcode
                    - attributeName: Issuer.Address.CityTown
                      attributeValueType: String
                      valuePath: $.ai.result.issuer.address.cityTown
                    - attributeName: Issuer.Address.NationalCode
                      attributeValueType: String
                      valuePath: $.ai.result.issuer.address.nationalCode
                    - attributeName: GrossTotal
                      attributeValueType: Double
                      valuePath: $.ai.result.amount.grossTotal
                    - attributeName: NetTotal
                      attributeValueType: Double
                      valuePath: $.ai.result.amount.netTotal
                    - attributeName: TaxTotal
                      attributeValueType: Double
                      valuePath: $.ai.result.amount.taxTotal
                - type: CreateAssociationUpdate@1
                  description: Queue a System/Related association from the new AccountingDocument to the stored FileSystemItem
                  targetPath: $.updates._assocUpdateItems
                  targetValueKind: Array
                  targetValueWriteMode: Append
                  updateKind: CREATE
                  originRtIdPath: $.updates._items[0].RtEntity.RtId
                  originCkTypeIdPath: $.updates._items[0].RtEntity.CkTypeId
                  targetRtIdPath: $.fileSystemItem.RtId
                  targetCkTypeIdPath: $.fileSystemItem.CkTypeId
                  associationRoleId: System/Related
                - type: ApplyChanges@2
                  description: Commit the queued entity insert + association to the database in one transaction
                  entityUpdatesPath: $.updates._items
                  associationUpdatesPath: $.updates._assocUpdateItems
                - type: Project@1
                  description: Strip the internal $.updates working area from the HTTP response
                  fields:
                    - path: "$.updates"
