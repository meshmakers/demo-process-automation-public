$schema: https://schemas.meshmakers.cloud/runtime-model.schema.json
dependencies:
  - System.Communication-[3.0,4.0)
entities:
  - rtId: 68c3d7248351566e3753fc73
    rtCreationDateTime: 2025-09-12T08:17:40.7220000Z
    rtChangedDateTime: 2025-09-12T13:48:31.4550000Z
    ckTypeId: System.Communication/DataFlow
    associations: []
    attributes:
      - id: System/Name
        value: upload_accounting_document_v1
      - id: System/Description
        value: Allows to upload a PDF document using HTTP.
  - rtId: 68c3d7248351566e3753fc74
    rtCreationDateTime: 2025-09-12T08:17:40.7750000Z
    rtChangedDateTime: 2025-09-12T13:44:47.3750000Z
    ckTypeId: System.Communication/Pipeline
    associations:
      - roleId: System/ParentChild
        targetRtId: 68c3d7248351566e3753fc73
        targetCkTypeId: System.Communication/DataFlow
      - roleId: System.Communication/Executes
        targetRtId: 66004fda527ac79a03ecedd7
        targetCkTypeId: System.Communication/Adapter
    attributes:
      - id: System/Name
        value: upload_accounting_document_v1_pipeline
      - id: System/Description
        value: >
          Accepts a PDF via HTTP POST, stores the file in the Accounting folder,
          creates a bare AccountingDocument (GrossTotal=0, no extraction), and
          links the two. No OCR or AI step — this is the baseline variant that
          Units 1 compares against the AI-enhanced v2/v3.
      - id: System/Enabled
        value: true
      - id: System.Communication/PipelineDefinition
        value: |-
          triggers:
            - type: FromHttpRequest@1
              description: POST /uploadAccountingDocument — entry point for the v1 upload endpoint
              path: /uploadAccountingDocument
              method: POST
          transformations:
            - type: Logger@1
              description: Debug log (kept to show pipeline is running; remove if noisy)
              message: upload_accounting_document_v1 invoked
            - type: If@1
              description: Only process requests whose content type is application/pdf; drop everything else
              path: $.contentType
              operator: Equals
              value: "application/pdf"
              valueType: String
              transformations:
                - type: CreateFileSystemUpdate@1
                  description: Store the uploaded PDF under the well-known "Accounting" root folder, auto-generate RtId and file name
                  targetPath: $.fileSystemItem
                  path: $.body
                  generateRtId: true
                  generateFileName: true
                  contentTypePath: $.contentType
                  contentLengthPath: $.contentLength
                  rootFolderWellKnownName: "Accounting"
                - type: Project@1
                  description: Strip large/raw HTTP fields from the data context so the eventual response stays small
                  fields:
                    - path: "$.body"
                    - path: "$.bodyEncoding"
                    - path: "$.path"
                    - path: "$.contentType"
                    - path: "$.contentLength"
                    - path: "$.method"
                - type: CreateUpdateInfo@1
                  description: Queue an INSERT for a new AccountingDocument with GrossTotal=0 (no AI extraction in v1)
                  targetPath: $.updates._items
                  targetValueKind: Array
                  targetValueWriteMode: Append
                  updateKind: INSERT
                  ckTypeId: AccountingDemo/AccountingDocument
                  rtIdPath: $.rtId
                  generateRtId: true
                  attributeUpdates:
                    - attributeName: GrossTotal
                      attributeValueType: Double
                      value: 0
                - type: CreateAssociationUpdate@1
                  description: Queue a System/Related association from the new AccountingDocument to the stored FileSystemItem
                  targetPath: $.updates._assocUpdateItems
                  targetValueKind: Array
                  targetValueWriteMode: Append
                  updateKind: CREATE
                  originRtIdPath: $.updates._items[0].RtEntity.RtId
                  originCkTypeIdPath: $.updates._items[0].RtEntity.CkTypeId
                  targetRtIdPath: $.fileSystemItem.RtId
                  targetCkTypeIdPath: $.fileSystemItem.CkTypeId
                  associationRoleId: System/Related
                - type: ApplyChanges@2
                  description: Commit the queued entity insert + association to the database in one transaction
                  entityUpdatesPath: $.updates._items
                  associationUpdatesPath: $.updates._assocUpdateItems
                - type: Project@1
                  description: Strip the internal $.updates working area from the HTTP response
                  fields:
                    - path: "$.updates"
